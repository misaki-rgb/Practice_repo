name: 3-1-if workflow

on:
  workflow_dispatch:
    inputs:
      run_step:
        description: Run conditional step
        required: false
        default: false
        type: boolean

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Job1 step
        run: echo "job1"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Conditional Step
        if: ${{ inputs.run_step }}
        run: echo "conditional step" 